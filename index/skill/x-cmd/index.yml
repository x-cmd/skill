- id: x-cmd/x-network
  url: x-cmd-skill-data:x-cmd/x-network
  reference: https://github.com/x-cmd/skill
  tag:
    - X-CMD
    - network-administration
    - diagnostics
    - connectivity
  license: Apache-2.0
  name: x-network
  description:
    en: This skill provides comprehensive network administration and diagnostic tools through x-cmd CLI, including network scanning with Nmap, ARP table management, DNS configuration, routing table analysis, and enhanced ping utilities. This skill should be used when users need to perform network diagnostics, troubleshoot connectivity issues, analyze network topology, or monitor network performance from command line interfaces.
    cn: 此技能通过 x-cmd CLI 提供全面的网络管理和诊断工具，包括 Nmap 网络扫描、ARP 表管理、DNS 配置、路由表分析和增强的 ping 工具。当用户需要执行网络诊断、排查连接问题、分析网络拓扑或从命令行监控网络性能时应使用此技能。
  author: X-CMD
  avatar: https://avatars.githubusercontent.com/u/79955600
