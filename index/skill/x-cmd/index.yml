  license: Apache-2.0
  name: x-git
  description:
    en: This skill provides comprehensive Git and code hosting platform management tools through x-cmd CLI, including GitHub, GitLab, Codeberg, Forgejo integration, and Git hooks management. This skill should be used when users need to manage Git repositories, work with code hosting platforms, automate Git workflows, or configure Git hooks from command line interfaces.
    cn: 此技能通过 x-cmd CLI 提供全面的 Git 和代码托管平台管理工具，包括 GitHub、GitLab、Codeberg、Forgejo 集成和 Git hooks 管理。当用户需要管理 Git 仓库、使用代码托管平台、自动化 Git 工作流或从命令行配置 Git hooks 时应使用此技能。
