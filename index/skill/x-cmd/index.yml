    en: This skill provides comprehensive security assessment and vulnerability management tools through x-cmd CLI, including network reconnaissance with Shodan, vulnerability scanning with OSV, and known exploited vulnerability tracking with KEV. This skill should be used when users need to perform security assessments, vulnerability research, network reconnaissance, or security monitoring from command line interfaces.
    cn: 此技能通过 x-cmd CLI 提供全面的安全评估和漏洞管理工具，包括使用 Shodan 进行网络侦察、使用 OSV 进行漏洞扫描和使用 KEV 追踪已知被利用的漏洞。当用户需要执行安全评估、漏洞研究、网络侦察或从命令行进行安全监控时应使用此技能。
